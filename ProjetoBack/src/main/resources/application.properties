spring.application.name=ProjetoBack
spring.output.ansi.enabled=always
# ===============================
# CONFIGURAĮÃO DO BANCO DE DADOS
# ===============================
# ATENĮÃO: Para desenvolvimento local, ajuste a URL, usuário e senha.
# Ao usar o Docker Compose, estas propriedades serão sobrescritas pelas variáveis de ambiente.
spring.datasource.url=jdbc:postgresql://localhost:5432/agendamentos_db
spring.datasource.username=postgres
spring.datasource.password=admin

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURAĮÃO DO JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# A opįão 'update' cria ou atualiza as tabelas automaticamente com base nas suas classes Java.
# Ótimo para desenvolvimento, mas use com cautela em produįão (prefira migraįões com Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Exibe no console os comandos SQL que o Hibernate está executando (ótimo para debugar).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONFIGURAĮÃO DO SERVIDOR WEB
# ===============================
server.port=8081
