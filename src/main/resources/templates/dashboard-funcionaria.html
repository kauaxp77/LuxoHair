<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Liso Luxo Hair • Área Técnica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body class="flex bg-[#fff7fa] min-h-screen">

  <aside class="w-72 bg-[#f5dfe6] p-8">
    <h1 class="text-4xl font-black text-[#d68aa1] mb-14">Liso Luxo</h1>
    <nav class="space-y-4">
      <div class="bg-[#d68aa1] text-white p-4 rounded-[20px] font-semibold"><i class="fa-solid fa-spray-can mr-3"></i>Minhas Agendas</div>
      <a href="login.html" class="block bg-white p-4 rounded-[20px] text-gray-600"><i class="fa-solid fa-sign-out-alt mr-3"></i>Sair</a>
    </nav>
  </aside>

  <main class="flex-1 p-10">
    <div class="mb-10 flex justify-between items-center">
      <div>
        <h1 class="text-5xl font-black text-gray-900">Olá, <span id="nome-profissional">Profissional</span> 🌸</h1>
        <p class="text-gray-500 mt-2">Visão restrita por governança: apenas cabelos processados na sua cadeira.</p>
      </div>
      <div class="bg-white p-5 rounded-3xl shadow-sm text-center border border-pink-100">
        <p class="text-xs text-gray-400 font-bold uppercase">Sua Comissão Acumulada</p>
        <h3 id="comissao-val" class="text-2xl font-black text-[#d68aa1]">R$ 0,00</h3>
      </div>
    </div>

    <div class="bg-white rounded-[30px] p-10 shadow-sm">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b text-gray-400 text-sm">
            <th class="pb-4">Cliente</th>
            <th class="pb-4">Procedimento</th>
            <th class="pb-4">Data</th>
            <th class="pb-4">Preço Bruto</th>
            <th class="pb-4 text-right">Validação</th>
          </tr>
        </thead>
        <tbody id="tabela-tecnica">
          <tr>
            <td colspan="5" class="text-center py-5 text-gray-400">Verificando cadeira técnica no PostgreSQL...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="js/funcionaria.js"></script>
</body>
</html>
