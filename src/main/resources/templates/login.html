<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liso Luxo Hair • Acesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { background: #f6f6f7; font-family: 'Inter', sans-serif; } .tab-active { border-bottom: 4px solid #8B6B4A; color: #1c1c1c; } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-5xl bg-white rounded-[40px] overflow-hidden shadow-2xl grid lg:grid-cols-2">
    <div class="bg-[#1c1c1c] text-white p-16 flex flex-col justify-between">
      <div>
        <p class="uppercase tracking-[6px] text-gray-400 text-sm mb-5">Engenharia de Software</p>
        <h1 class="text-6xl font-black mb-8 text-[#c7a17a]">Liso Luxo</h1>
        <p class="text-gray-400 text-lg leading-relaxed max-w-md">Solução integrada para gerenciamento de filas e controle financeiro de comissões.</p>
      </div>
      <div class="text-xs text-gray-500">Projeto Prático A1 - Aplicações Backend.</div>
    </div>

    <div class="p-12 flex flex-col justify-center">
      <div class="flex border-b border-gray-200 mb-10 text-lg font-bold text-gray-400">
        <button id="btnTabLogin" onclick="switchTab('login')" class="flex-1 pb-4 tab-active">Entrar</button>
        <button id="btnTabCadastro" onclick="switchTab('cadastro')" class="flex-1 pb-4">Criar Conta</button>
      </div>

      <div id="erro" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-[22px] p-4 mb-6 text-sm font-semibold">Login incorreto.</div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block mb-2 font-semibold text-gray-700 text-sm">E-mail Corporativo ou Cliente</label>
          <input id="loginEmail" type="email" placeholder="seu-email@exemplo.com" required class="w-full h-14 rounded-[20px] bg-[#f6f6f6] px-5 outline-none focus:ring-2 focus:ring-[#8B6B4A]"/>
        </div>
        <div>
          <label class="block mb-2 font-semibold text-gray-700 text-sm">Senha</label>
          <input id="loginSenha" type="password" placeholder="••••••••" required class="w-full h-14 rounded-[20px] bg-[#f6f6f6] px-5 outline-none focus:ring-2 focus:ring-[#8B6B4A]"/>
        </div>
        <button class="w-full h-14 rounded-[20px] bg-[#1c1c1c] hover:bg-black transition text-white font-semibold text-lg">Acessar Sistema</button>
      </form>

      <form id="cadastroForm" class="space-y-4 hidden">
        <div>
          <label class="block mb-1 font-semibold text-gray-700 text-sm">Nome Completo</label>
          <input type="text" placeholder="Insira seu nome" required class="w-full h-12 rounded-[18px] bg-[#f6f6f6] px-5 outline-none"/>
        </div>
        <div>
          <label class="block mb-1 font-semibold text-gray-700 text-sm">WhatsApp</label>
          <input type="tel" placeholder="(61) 99999-9999" required class="w-full h-12 rounded-[18px] bg-[#f6f6f6] px-5 outline-none"/>
        </div>
        <div>
          <label class="block mb-1 font-semibold text-gray-700 text-sm">E-mail</label>
          <input type="email" placeholder="nome@provedor.com" required class="w-full h-12 rounded-[18px] bg-[#f6f6f6] px-5 outline-none"/>
        </div>
        <div>
          <label class="block mb-1 font-semibold text-gray-700 text-sm">Senha</label>
          <input type="password" placeholder="Senha de Acesso" required class="w-full h-12 rounded-[18px] bg-[#f6f6f6] px-5 outline-none"/>
        </div>
        <button type="button" onclick="simularCadastro()" class="w-full h-14 rounded-[20px] bg-[#8B6B4A] text-white font-semibold text-lg">Efetuar Cadastro</button>
      </form>
    </div>
  </div>

  <script>
    // Função para alternar entre as abas de Login e Criar Conta
    function switchTab(type) {
      document.getElementById('erro').classList.add('hidden');

      if(type === 'login') {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('cadastroForm').classList.add('hidden');
        document.getElementById('btnTabLogin').classList.add('tab-active');
        document.getElementById('btnTabCadastro').classList.remove('tab-active');
      } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('cadastroForm').classList.remove('hidden');
        document.getElementById('btnTabLogin').classList.remove('tab-active');
        document.getElementById('btnTabCadastro').classList.add('tab-active');
      }
    }

    // Função de simulação de cadastro
    function simularCadastro() {
      alert('Cadastro efetuado! Você pode fazer login como Cliente agora.');
      switchTab('login');
    }

    // --- EVENTO DE LOGIN CORRIGIDO ---
    // Agora o código está escutando o envio do formulário corretamente!
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // Impede a página de recarregar
      document.getElementById('erro').classList.add('hidden');

      const login = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginSenha').value;

      try {
        // Faz a requisição exatamente para a sua rota relativa do backend
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            login: login,
            password: password
          })
        });

        if (!response.ok) {
          document.getElementById('erro').classList.remove('hidden');
          return;
        }

        const data = await response.json();

        // Salva o token JWT retornado pelo Spring no navegador
        localStorage.setItem('token', data.token);

        // Executa os seus redirecionamentos originais que funcionavam!
        if (data.role === 'USER') {
          window.location.href = '/cliente';
        }
        else if (data.role === 'FUNC') {
          window.location.href = '/funcionario';
        }
        else if (data.role === 'ADMIN') {
          window.location.href = '/gerente';
        }
        else {
          alert('Role inválida.');
        }

      } catch (error) {
        console.error("Erro no login:", error);
        document.getElementById('erro').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
